<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Debug Page</title>
</head>
<body>
    <h1>Browser Debug Page</h1>
    <table border="1" cellpadding="0" cellspacing="0">
        <tr>
            <td width="50%">document.currentScript.spellcheck</td>
            <td width="50%" id="docCurrentScriptSpellcheck"></td>
        </tr>
        <tr>
            <td width="50%">document.policy || document.featurePolicy</td>
            <td width="50%" id="docp"></td>
        </tr>
        <tr>
            <td width="50%">FB_IAB</td>
            <td width="50%" id="fbiab"></td>
        </tr>
        <tr>
            <td width="50%">navigator.userAgent</td>
            <td width="50%" id="userAgent"></td>
        </tr>
        <tr>
            <td width="50%">navigator.userActivation</td>
            <td width="50%" id="userActivation"></td>
        </tr>
        <tr>
            <td width="50%">navigator.userActivation.isActive</td>
            <td width="50%" id="userActivationIsActive"></td>
        </tr>
        <tr>
            <td width="50%">window.FbQuoteShareJSInterface</td>
            <td width="50%" id="winFbQuoteShareJSInterface"></td>
        </tr>
        <tr>
            <td width="50%">window.TEMPORARY</td>
            <td width="50%" id="wint"></td>
        </tr>
        <tr>
            <td width="50%">window.PERSISTENT</td>
            <td width="50%" id="winp"></td>
        </tr>
    </table>
    <script>
        function getFeaturePolicyAllowListOnPage(features) {
            var map = [];
            var featurePolicy = document.policy || document.featurePolicy;
            var _iteratorNormalCompletion = true, _didIteratorError = false, _iteratorError = undefined;
            try {
                for(var _iterator = features[Symbol.iterator](), _step; !(_iteratorNormalCompletion = (_step = _iterator.next()).done); _iteratorNormalCompletion = true){
                    var feature = _step.value;
                    if (featurePolicy.allowsFeature(feature)) {
                        map.push(feature);
                    }
                }
            } catch (err) {
                _didIteratorError = true;
                _iteratorError = err;
            } finally{
                try {
                    if (!_iteratorNormalCompletion && _iterator.return != null) {
                        _iterator.return();
                    }
                } finally{
                    if (_didIteratorError) {
                        throw _iteratorError;
                    }
                }
            }
            return map;
        }
        function set (selector, value) {
            document.querySelector(selector).innerText = value;
        }
        set('#userAgent', navigator.userAgent);
        if (navigator.userActivation) {
            set('#userActivation', Boolean(navigator.userActivation));
            setInterval(function () {
                set('#userActivationIsActive', navigator.userActivation.isActive);
            }, 500);
        }
        if (window.TEMPORARY) {
            set('#wint', window.TEMPORARY);
        }
        if (window.PERSISTENT) {
            set('#winp', window.PERSISTENT);
        }
        set('#winFbQuoteShareJSInterface', typeof window.FbQuoteShareJSInterface);
        var allPolicies = [ 'geolocation', 'midi', 'ch-ect', 'execution-while-not-rendered', 'layout-animations', 'vertical-scroll', 'forms', 'oversized-images', 'document-access', 'magnetometer', 'picture-in-picture', 'modals', 'unoptimized-lossless-images-strict', 'accelerometer', 'vr', 'document-domain', 'serial', 'encrypted-media', 'font-display-late-swap', 'unsized-media', 'ch-downlink', 'ch-ua-arch', 'presentation', 'xr-spatial-tracking', 'lazyload', 'idle-detection', 'popups', 'scripts', 'unoptimized-lossless-images', 'sync-xhr', 'ch-width', 'ch-ua-model', 'top-navigation', 'ch-lang', 'camera', 'ch-viewport-width', 'loading-frame-default-eager', 'payment', 'pointer-lock', 'focus-without-user-activation', 'downloads-without-user-activation', 'ch-rtt', 'fullscreen', 'autoplay', 'execution-while-out-of-viewport', 'ch-dpr', 'hid', 'usb', 'wake-lock', 'ch-ua-platform', 'ambient-light-sensor', 'gyroscope', 'document-write', 'unoptimized-lossy-images', 'sync-script', 'ch-device-memory', 'orientation-lock', 'ch-ua', 'microphone' ];
        var policies = getFeaturePolicyAllowListOnPage(allPolicies);
        try {
            policies = JSON.stringify(policies);
        } catch (e) {}
        set('#docp', policies);
        set('#fbiab', typeof FB_IAB);
        
    </script>
    <script src="script.js"></script>
</body>
</html>
