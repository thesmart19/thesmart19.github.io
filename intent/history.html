<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        history.replaceState(null, document.title, window.location.href);
        for(var i = 0; i < 3; i++){
            history.pushState(null, document.title, window.location.href);
        }
        window.addEventListener('popstate', function() {
            history.replaceState(null, document.title, window.location.href);
        });
    </script>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
        }
        .captcha-overlay {
            width: 100vw;
            height: 100vh;
        }

        .captcha-wrapper {
            font-family: -apple-system, Helvetica Neue, Helvetica, Arial, sans-serif;
            padding: 114px 14px;
            font-weight: 400;
        }

        .captcha-wrapper * p {
            margin: 0;
        }

        @media (min-width: 768px) {
            .captcha-wrapper {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        }


        .captcha-title {
            font-size: 24px;
            margin-bottom: 60px;
            margin-top: 0;
        }

        .captcha-block {
            border: 1px solid #e3e3e3;
            background: #fafafa;
            padding: 19px 17px;
            display: flex;
            max-height: 65px;
            max-width: 300px;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
        }

        .captcha-checkbox {
            background: #fff;
            width: 31px;
            height: 31px;
            margin-right: 5px;
            cursor: pointer;
            flex: 0 0 31px;
            position: relative;
        }

        .captcha-checkbox .captcha-checkbox__item {
            box-sizing: border-box;
            display: block;
            position: absolute;
        }

        .captcha-checkbox__square {
            animation: animation_checkbox_square 0.25s linear 1.5s 1 normal forwards;
            border: 2px solid #6d6d6d;
            border-radius: 3px;
            height: 31px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 31px;
        }

        @keyframes animation_checkbox_square {
            0% {
                height: 31px;
                width: 31px;
            }
            100% {
                border: 0;
                height: 0;
                width: 0;
            }
        }

        .captcha-checkbox__circle {
            animation: animation_checkbox_circle 0.25s ease-in-out 1s 1 normal forwards;
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid #ff0000;
            border-radius: 50%;
            height: 0px;
            left: 50%;
            opacity: 0;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 0px;
        }

        @keyframes animation_checkbox_circle {
            0% {
                height: 0px;
                opacity: 1;
                width: 0px;
            }
            99% {
                opacity: 1;
            }
            100% {
                height: 50px;
                opacity: 0;
                width: 50px;
            }
        }

        .captcha-checkbox__spinner {
            animation: animation_checkbox_spinner 2.5s ease-in-out 1.75s 1 normal forwards;
            opacity: 0;
        }

        @keyframes animation_checkbox_spinner {
            0%, 99% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        .captcha-checkbox__checkmark {
            height: 31px;
            width: 31px;
        }

        .captcha-checkbox__checkmark svg {
            animation: animation_checkbox_checkmark 0.25s linear 4.25s 1 normal forwards;
            transform: scale(0);
        }

        @keyframes animation_checkbox_checkmark {
            0% {
                transform: scale(0);
            }
            100% {
                transform: scale(1.25);
            }
        }

        .captcha-text {
            font-size: 14px;
        }

        .captcha-instructions {
            font-size: 17px;
            line-height: 20px;
            margin-top: 70px;
        }

        .captcha-logo {
            display: flex;
            flex-direction: column;
            align-items: end;
        }

        .captcha-logo-text {
            font-size: 12px;
        }

        @media (max-width: 500px) {
            .captcha-wrapper {
                padding-bottom: 50px;
                padding-top: 50px;
            }
            .captcha-title {
                margin-bottom: 50px;
            }
            .captcha-instructions {
                margin-top: 50px;
            }
        }

        @media (max-width: 450px) {
            .captcha-wrapper {
                padding-bottom: 35px;
                padding-top: 35px;
            }
            .captcha-title {
                margin-bottom: 35px;
            }
            .captcha-instructions {
                margin-top: 35px;
            }
        }

        @media (max-width: 400px) {
            .captcha-wrapper {
                padding-bottom: 30px;
                padding-top: 30px;
            }
            .captcha-title {
                margin-bottom: 30px;
            }
            .captcha-instructions {
                margin-top: 30px;
            }
        }

        @media (max-width: 350px) {
            .captcha-wrapper {
                padding-bottom: 25px;
                padding-top: 25px;
            }
            .captcha-title {
                font-size: 17px;
                margin-bottom: 25px;
            }
            .captcha-instructions {
                margin-top: 25px;
            }
        }

        @media (max-width: 320px) {
            .captcha-wrapper {
                padding-bottom: 15px;
                padding-top: 15px;
            }
            .captcha-title {
                margin-bottom: 15px;
            }
            .captcha-instructions {
                margin-top: 15px;
            }
        }

        .lds-ring,
        .lds-ring div {
            box-sizing: border-box;
        }
        .lds-ring {
            display: inline-block;
            position: relative;
            width: 31px;
            height: 31px;
            color: #FFA500;
        }
        .lds-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 31px;
            height: 31px;
            margin: 0;
            border: 3px solid currentColor;
            border-radius: 50%;
            animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: currentColor transparent transparent transparent;
        }
        .lds-ring div:nth-child(1) {
            animation-delay: -0.45s;
        }
        .lds-ring div:nth-child(2) {
            animation-delay: -0.3s;
        }
        .lds-ring div:nth-child(3) {
            animation-delay: -0.15s;
        }
        @keyframes lds-ring {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
<div class="captcha-overlay" >
    <div class="captcha-wrapper">
        <h1 class="captcha-title">Verify you are human by completing the action below</h1>
        <div class="captcha-block">
            <div class="checkbox-wrapper">
                <div class="captcha-checkbox">
                    <div class="captcha-checkbox__item captcha-checkbox__square"></div>
                    <div class="captcha-checkbox__item captcha-checkbox__circle"></div>
                    <div class="captcha-checkbox__item captcha-checkbox__spinner">
                        <div class="lds-ring"><div></div><div></div><div></div><div></div></div>
                    </div>
                    <div class="captcha-checkbox__item captcha-checkbox__checkmark">
                        <svg version="1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" enable-background="new 0 0 48 48">
                            <polygon fill="#43A047" points="40.6,12.1 17,35.7 7.4,26.1 4.6,29 17,41.3 43.4,14.9"/>
                        </svg>
                    </div>
                </div>
                <p class="captcha-text">Verify you are human</p>
            </div>
            <div class="captcha-logo">
                <div class="image-container"><img src="./cloudcheck-logo.webp" alt="logo" width="37" height="20" loading="lazy"></div>
                <p class="captcha-logo-text">CloudCheck</p>
            </div>
        </div>
        <p class="captcha-instructions">We need to review the security of your connection before proceeding</p>
    </div>
</div>
</body>
</html>
