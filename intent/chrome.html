<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome</title>
    <style>
        html, body { height: 100%; width: 100%;}
        body, h1 { margin: 0; }
    </style>
</head>
<body>
    <h1>Chrome</h1>
    <p>history length: <span class="history-length"></span></p>
    <p class="info"></p>
    <script>
        if (document.fullscreenEnabled) {
            document.requestFullscreen()
        } else {
            document.querySelector('.info').innerText = 'Fullscreen is not available'
        }

        window.onpopstate = () => {
            window.location.replace('/intent/back.html')
        }
        for (let i=0; i<3; i++) {
            window.history.pushState(null, '', window.location.href)
        }
        document.querySelector('.history-length').innerText = window.history.length
    </script>
</body>
</html>
