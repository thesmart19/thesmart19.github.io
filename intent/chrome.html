<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome</title>
    <style>
        html, body { height: 100%; width: 100%;}
        body, h1 { margin: 0; }
    </style>
</head>
<body>
    <h1>Chrome</h1>
    <p>back.html history length: <span class="history-length"></span></p>
    <p>onbeforeunload</p>
    <script>
        window.onbeforeunload = () => {
            return ''
        }
        for (let i=0; i<3; i++) {
            window.history.pushState(null, '', '/back.html')
        }
        document.querySelector('.history-length').innerText = window.history.length
    </script>
</body>
</html>
