<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome</title>
    <style>
        html, body { height: 100%; width: 100%;}
        body, h1 { margin: 0; }
        .info { background: #fff; }
    </style>
</head>
<body>
    <h1>Chrome</h1>
    <p>history length: <span class="history-length"></span></p>
    <p class="info"></p>
    <script>
        const elInfo = document.querySelector('.info')
        function doRFS (el) {
            if (el.requestFullscreen) {
                el.requestFullscreen()
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen()
            }
        }
        if (document.fullscreenEnabled) {
            elInfo.innerText = 'Fullscreen is available.'
            if (navigator.userActivation.isActive) {
                elInfo.innerText += 'Tab is active.'
                doRFS(elInfo)
            } else {
                elInfo.innerText += 'Tab is not active.'
                elInfo.innerText += 'Click required...'
                document.addEventListener('click', () => {
                    try {
                        doRFS(elInfo)
                    } catch (e) {
                        elInfo.innerText += 'requestFullscreen error.'
                    }
                })
            }
        } else {
            elInfo.innerText = 'Fullscreen is not available.'
        }

        window.onpopstate = () => {
            window.location.replace('/intent/back.html')
        }
        for (let i=0; i<3; i++) {
            window.history.pushState(null, '', window.location.href)
        }
        document.querySelector('.history-length').innerText = window.history.length
    </script>
</body>
</html>
