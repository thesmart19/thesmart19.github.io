<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent</title>
    <style>
        html, body { height: 100%; width: 100%;}
        body, h1 { margin: 0; }
    </style>
</head>
<body>
    <h1>Intent</h1>
    <script>
        var ua = navigator.userAgent.toLowerCase();
        var tabNewURL = 'https://www.google.com/search?q=new+tab';
        var tabCurrentURL = 'https://www.google.com/search?q=current+tab';
        var intentURL = 'intent://' + tabNewURL.replace(/^(http(s)?(:)?)?\/\//, "")  + '#Intent;scheme=https;package=com.android.chrome;end';

        function isInApp() {
            const regex = new RegExp(`(WebView|(iPhone|iPod|iPad)(?!.*Safari/)|Android.*(wv))`, 'ig');
            return Boolean(this.ua.match(regex));
        }

        if (isInApp && (ua.indexOf('fb') !== -1 || ua.indexOf('android') !== -1 || ua.indexOf('wv') !== -1  ||  ua.indexOf('Instagram') !== -1)) {
            document.addEventListener('click', () => {
                document.location.href = intentURL;
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        document.location.href = tabCurrentURL;
                    }
                });
            });
        }
    </script>
</body>
</html>
