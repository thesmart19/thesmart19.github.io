<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent</title>
    <style>
        html, body { height: 100%; width: 100%;}
        body, h1 { margin: 0; }
    </style>
</head>
<body>
    <h1>Intent</h1>
    <h2></h2>
    <h3></h3>
    <script>
        var trafficbackURL = 'https://www.google.com/search?q=new+tab';
        var landingpageURL = 'https://www.google.com/search?q=current+tab';

        function isInApp() {
            const regex = new RegExp(`(WebView|(iPhone|iPod|iPad)(?!.*Safari/)|Android.*(wv))`, 'ig');
            return Boolean(this.ua.match(regex));
        }

        function initInappRd() {
            var ua = navigator.userAgent.toLowerCase();

            if (isInApp && (ua.indexOf('fb') !== -1 || ua.indexOf('android') !== -1 || ua.indexOf('wv') !== -1  ||  ua.indexOf('Instagram') !== -1)) {
                document.body.addEventListener('click', function () {
                    document.location.href = 'intent://' + trafficbackURL.replace(/^(http(s)?(:)?)?\/\//, "")  + '#Intent;scheme=https;package=com.android.chrome;end';
                });
                /*
                document.body.addEventListener('click', function () {
                    window.open('intent://' + trafficbackURL.replace(/^(http(s)?(:)?)?\/\//, "")  + '#Intent;scheme=https;package=com.android.chrome;end');
                    setTimeout(() => {
                        document.location.href = landingpageURL;
                    }, 1000);
                });
                */
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initInappRd);
        } else {
            initInappRd();
        }

        document.addEventListener('visibilitychange', () => {
            let msg = 'Document is ';
            if (document.hidden) {
                msg += 'hidden'
            } else {
                msg += 'visible'
            }
            document.querySelector('h2').innerText = msg;
        });

        window.addEventListener('blur', () => {
            document.querySelector('h3').innerText = 'blur';
        });
        window.addEventListener('focus', () => {
            document.querySelector('h3').innerText = 'focus';
        });
    </script>
</body>
</html>
