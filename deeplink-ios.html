<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeplink</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Deeplink</h1>
    <h3></h3>
    <script>
        (() => {
            const visibilityStack = [];

            const url = 'www.google.com';
            const iOSDeepLinkChrome = `googlechromes://${url}`;

            window.location.href = iOSDeepLinkChrome;

            document.addEventListener("visibilitychange", () => {
                visibilityStack.push(document.visibilityState);
            });

            window.addEventListener('focus', () => {
                let msg = 'google chrome: ';

                if (visibilityStack.length === 1 && visibilityStack[0] === 'hidden') {
                    msg += 'opened';
                } else {
                    msg += 'cancelled (or not installed)';
                }

                document.querySelector('h3').innerText = `[${msg}]`;
            });
        })()
    </script>
</body>
</html>
