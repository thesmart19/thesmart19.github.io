<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent</title>
</head>
<body>
    <h1>Aliexpress Android Intent</h1>
    <h3></h3>

    <script>
        (() => {
            const intentPackage = 'com.alibaba.aliexpresshd';
            const intentScheme = 'aliexpress';
            const intentUrlFallback = 'https://www.google.com/search?q=how+to+install+aliexpress';
            const eventStack = [];

            let intentURI = 'intent://#Intent;'
            intentURI += `package=${intentPackage};`
            intentURI += `action=android.intent.action.VIEW;`
            intentURI += `category=android.intent.category.BROWSABLE;`
            intentURI += `scheme=${intentScheme};`
            intentURI += `S.browser_fallback_url=${encodeURIComponent(intentUrlFallback)};`
            intentURI += 'end;'

            const regex = {
                android: 'android',
                webview: 'webview|; wv\\)',
            }

            function is(pattern) {
                return Boolean(navigator.userAgent.match(new RegExp(pattern, 'ig')))
            }

            const isAndroid = is(regex.android);
            const isAndroidWebView = is(regex.webview);
            const ua = navigator.userAgent;
            const chromeVersionChromeMatch = ua.match(/Chrome\/([0-9]{1,})/) || [];
            const chromeVersionCriOSMatch = ua.match(/CriOS\/([0-9]{1,})/) || [];
            const chromeVersion = parseInt(chromeVersionChromeMatch[1], 10) || parseInt(chromeVersionCriOSMatch[1], 10);
            const isYandexBrowser = /YaBrowser/.test(ua);
            const isChrome = chromeVersion && !isYandexBrowser;

            if (isAndroid) {
                function detectApp() {
                    if (isChrome) {
                        document.querySelector('h3').innerText = JSON.stringify(eventStack);
                    } else if (isAndroidWebView) {
                        document.querySelector('h3').innerText = JSON.stringify(eventStack);
                    }
                }

                document.addEventListener("visibilitychange", () => {
                    eventStack.push({
                        event: document.visibilityState,
                        time: Date.now(),
                    });

                    if (document.visibilityState === 'hidden') {
                        detectApp();
                    }
                });

                window.addEventListener("pagehide", () => {
                    eventStack.push({
                        event: 'pagehide',
                        time: Date.now(),
                    });
                });

                document.addEventListener('click', () => {
                    eventStack.push({
                        event: 'click',
                        time: Date.now(),
                    });
                    document.location.href = intentURI;
                });

                /*
                eventStack.push({
                    event: 'load',
                    time: Date.now(),
                });
                document.location.href = intentURI;
                */
            }
        })()
    </script>
</html>
