<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent</title>
</head>
<body>
    <h1>Aliexpress Android Intent</h1>
    <a href="">Click me</a>
    <h3></h3>

    <script>
        (() => {
            const intentPackage = 'com.alibaba.aliexpresshd';
            const intentScheme = 'aliexpress';
            const intentUrlFallback = 'https://www.google.com/search?q=how+to+install+aliexpress';

            let intentURI = 'intent://#Intent;'
            intentURI += `package=${intentPackage};`
            intentURI += `scheme=${intentScheme};`
            intentURI += `S.browser_fallback_url=${encodeURIComponent(intentUrlFallback)};`
            intentURI += 'end;'

            const visibilityStack = [];

            const regex = {
                android: 'android',
                fb: 'FBAV',
                fbmessenger: 'FBAN/Messenger',
                instagram: 'Instagram',
                twitter: 'Twitter',
                webview: 'webview|; wv\\)',
            }

            function is(pattern) {
                return Boolean(navigator.userAgent.match(new RegExp(pattern, 'ig')))
            }

            const isAndroidWebView = is(regex.webview);
            const isFacebookBrowser = is(regex.fb);
            const isFacebookMessenger = is(regex.fbmessenger);
            const isTwitter = is(regex.twitter);
            const isInstagram = is(regex.instagram);

            const shouldIntent = isAndroidWebView || isFacebookBrowser || isFacebookMessenger || isInstagram || isTwitter

            if (shouldIntent) {
                document.querySelector('a').href = intentURI;

                document.querySelector('a').addEventListener('click', (e) => {
                    e.preventDefault();

                    document.location.href = e.target.href;
                });

                document.addEventListener("visibilitychange", () => {
                    visibilityStack.push(document.visibilityState);
                    document.querySelector('h3').innerText += `[${visibilityStack.join(',')}]`;
                });

                window.addEventListener('hashchange', () => {
                    console.log("The hash has changed!");
                });

                window.addEventListener('focus', () => {
                    document.querySelector('h3').innerText += `[${visibilityStack.join(',')}]`;
                });

                document.location.href = intentURI;
            }
        })()
    </script>
</html>
