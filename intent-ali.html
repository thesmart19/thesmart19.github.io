<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent</title>
</head>
<body>
    <h1>Aliexpress Android Intent</h1>
    <h3></h3>

    <script>
        (() => {
            const intentPackage = 'com.alibaba.aliexpresshd';
            const intentScheme = 'aliexpress';
            const intentUrlFallback = 'https://www.google.com/search?q=how+to+install+aliexpress';

            let intentURI = 'intent://#Intent;'
            intentURI += `package=${intentPackage};`
            intentURI += `action=android.intent.action.VIEW;`
            intentURI += `category=android.intent.category.BROWSABLE;`
            intentURI += `scheme=${intentScheme};`
            intentURI += `S.browser_fallback_url=${encodeURIComponent(intentUrlFallback)};`
            intentURI += 'end;'

            const eventStack = [];

            document.addEventListener("visibilitychange", () => {
                eventStack.push(document.visibilityState);
                document.querySelector('h3').innerText = `[${eventStack.join(',')}]`;
            });

            window.addEventListener("pagehide", (event) => {
                eventStack.push('pagehide');
                document.querySelector('h3').innerText = `[${eventStack.join(',')}]`;
            });

            /*document.addEventListener('click', () => {
                eventStack.push('click');
                document.querySelector('h3').innerText = `[${eventStack.join(',')}]`;
                document.location.href = intentURI;
            });*/

            eventStack.push('intent');
            document.querySelector('h3').innerText = `[${eventStack.join(',')}]`;
            document.location.href = intentURI;
        })()
    </script>
</html>
