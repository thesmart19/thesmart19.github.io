<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent</title>
</head>
<body>
    <h1>Aliexpress Android Intent</h1>
    <a href="">Click me</a>
    <h3></h3>

    <script>
        (() => {
            const intentPackage = 'com.alibaba.aliexpresshd';
            const intentScheme = 'aliexpress';
            const intentUrlFallback = 'https://www.google.com/search?q=how+to+install+aliexpress';

            let intentURI = 'intent://#Intent;'
            intentURI += `package=${intentPackage};`
            // intentURI += `action=android.intent.action.VIEW;`
            intentURI += `category=android.intent.category.BROWSABLE;`
            intentURI += `scheme=${intentScheme};`
            intentURI += `S.browser_fallback_url=${encodeURIComponent(intentUrlFallback)};`
            intentURI += 'end;'

            const visibilityStack = [];

            document.querySelector('a').href = intentURI;

            document.querySelector('a').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();

                document.location.href = e.target.href;
            });

            document.addEventListener("visibilitychange", () => {
                visibilityStack.push(document.visibilityState);
                document.querySelector('h3').innerText += `[${visibilityStack.join(',')}]`;
            });

            window.addEventListener('hashchange', () => {
                document.querySelector('h3').innerText += `[hash has changed]`;
            });

            document.location.href = intentURI;
        })()
    </script>
</html>
