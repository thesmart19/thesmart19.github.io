<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeplink</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Deeplink</h1>
    <h2>Click to open deeplink</h2>
    <h3></h3>
    <script>
        (() => {
            const url = 'www.google.com/search?q=deeplink';
            const deeplink = `googlechromes://${url}`;

            document.addEventListener('click', () => {
                if (!window.open(deeplink, '_blank')) {
                    document.querySelector('h3').innerText = `window.open failed to open ${deeplink}`;
                }
            });
        })()
    </script>
</body>
</html>
