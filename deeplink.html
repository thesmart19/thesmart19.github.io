<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeplink</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Deeplink</h1>
    <h2 id="dplios">iOS: Click to open deeplink</h2>
    <h2 id="dpland">Android: Click to open intent link</h2>
    <h3></h3>
    <script>
        (() => {
            const url = 'www.google.com/search?q=deeplink';
            const androidIntentLink = 'intent://' + url.toString().replace(/^(http(s)?(:)?)?\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end'
            const iOSDeepLink = `googlechromes://${url}`;

            document.querySelector('#dpland').addEventListener('click', () => {
                if (!window.open(androidIntentLink, '_blank')) {
                    document.querySelector('h3').innerText = `window.open failed to open ${androidIntentLink}`;
                }
            });

            document.querySelector('#dplios').addEventListener('click', () => {
                if (!window.open(iOSDeepLink, '_blank')) {
                    document.querySelector('h3').innerText = `window.open failed to open ${iOSDeepLink}`;
                }
            });
        })()
    </script>
</body>
</html>
