<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeplink</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Deeplink</h1>
    <h2 id="stimer"></h2>
    <h2 id="dplios">iOS: Click to open deeplink</h2>
    <h2 id="dpliosopera">iOS: Click to open deeplink in OPERA browser</h2>
    <h2 id="dpland">Android: Click to open intent link</h2>
    <h3></h3>
    <script>
        (() => {
            function isValidUrl(string) {
                try {
                    new URL(string);
                    return true;
                } catch (err) {
                    return false;
                }
            }

            const url = 'www.google.com/search?q=deeplink';
            const androidIntentLink = 'intent://' + url.toString().replace(/^(http(s)?(:)?)?\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end'
            const iOSDeepLink = `googlechromes://${url}`;
            const iOSDeepLinkOpera = `touch-https://${url}`;

            document.querySelector('#dpland').addEventListener('click', () => {
                const newTab = window.open(androidIntentLink, '_blank');

                try {
                    if (newTab.location.href) {
                        document.querySelector('h3').innerText += `[window.open success]`;
                    }
                } catch (e) {
                    document.querySelector('h3').innerText += `[window.open failed to open ${androidIntentLink}, error: ${e}]`;
                }
            });

            if (isValidUrl(iOSDeepLink)) {
                document.querySelector('h3').innerText += `[URL is valid: ${iOSDeepLink}]`;
            } else {
                document.querySelector('h3').innerText += `[URL IS NOT valid: ${iOSDeepLink}]`;
            }

            try {
                window.location.href = iOSDeepLink;
            } catch (e) {
                document.querySelector('h3').innerText += `[failed to open ${iOSDeepLink}, error: ${e}]`;
            }

            document.querySelector('#dplios').addEventListener('click', () => {
                const newTab = window.open(iOSDeepLink, '_blank');

                try {
                    if (newTab.location.href) {
                        document.querySelector('h3').innerText += `[window.open success]`;
                    }
                } catch (e) {
                    document.querySelector('h3').innerText += `[window.open failed to open ${iOSDeepLink}, error: ${e}]`;
                }
            });
            let visibilityCounter = 0;
            let visibilityTime = 0;
            document.addEventListener("visibilitychange", (event) => {
                visibilityCounter += 1;
                visibilityTime = Date.now() - visibilityTime;
                document.querySelector('h3').innerText += `[document.visibilityState = ${document.visibilityState} ${visibilityTime}]`;

                if (visibilityCounter === 2 && visibilityTime < 1000) {
                    document.querySelector('h3').innerText += `[OPEN SUCCESS]`
                }
            });

            document.querySelector('#dpliosopera').addEventListener('click', () => {
                const newTab = window.open(iOSDeepLinkOpera, '_blank');

                try {
                    if (newTab.location.href) {
                        document.querySelector('h3').innerText += `[window.open success]`;
                    }
                } catch (e) {
                    document.querySelector('h3').innerText += `[window.open failed to open ${iOSDeepLinkOpera}, error: ${e}]`;
                }
            });

            setInterval(() => {
                document.querySelector('#stimer').innerText = (new Date()).getSeconds();
            }, 1000);
        })()
    </script>
</body>
</html>
