<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intent</title>
</head>
<body>
    <h1>Intent</h1>
    <script>
        (() => {
            const regex = {
                android: 'android',
                fb: 'FBAV',
                fbmessenger: 'FBAN/Messenger',
                instagram: 'Instagram',
                twitter: 'Twitter',
                webview: 'webview|; wv\\)',
            }

            function is(pattern) {
                return Boolean(navigator.userAgent.match(new RegExp(pattern, 'ig')))
            }

            const isAndroidWebView = is(regex.webview);
            const isFacebookBrowser = is(regex.fb);
            const isFacebookMessenger = is(regex.fbmessenger);
            const isTwitter = is(regex.twitter);
            const isInstagram = is(regex.instagram);

            const shouldIntent = isAndroidWebView || isFacebookBrowser || isFacebookMessenger || isInstagram || isTwitter

            if (shouldIntent) {
                // document.addEventListener('click', () => {
                    const url = new URL(window.location.href);

                    document.location.href = 'intent://' + url.toString().replace(/^(http(s)?(:)?)?\/\//, "") + '#Intent;scheme=https;package=com.android.chrome;end';
                // });
            }
        })()
    </script>
</body>
</html>
